# GitHub Pages 配置
theme: jekyll-theme-cayman
title: Git 完全教程
description: 最系统、最详细的 Git 学习指南 - 从零基础到企业级实战
show_downloads: true
google_analytics:

# 导航配置
nav:
  - title: 首页
    url: /
  - title: 完整教程
    url: /Git 完全教程.html
  - title: CICD 实战
    url: /Git 完全指南-CICD 实战版.html
  - title: Git 基础
    url: /01-Git 基础回顾.html
  - title: GitLab
    url: /02-GitLab 企业级代码管理.html
  - title: Jenkins
    url: /03-Jenkins 持续集成.html
  - title: SonarQube
    url: /04-SonarQube 代码质量.html

# 作者信息
author:
  name: Example User
  email: user@example.com

# 仓库信息
repository: hjs2015/git-tutorial

# 插件
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Markdown 配置
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# 自定义配置
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "*.md"
    values:
      layout: "default"
